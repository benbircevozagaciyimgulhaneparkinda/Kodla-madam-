<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dinamik Giriş Sistemi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #sonuc { margin-top: 15px; padding: 10px; border-radius: 5px; background: #2d2d2d; font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sistem Girişi</h2>
    <input type="password" id="anahtar" placeholder="Anahtarı Girin...">
    <button onclick="islemYap()">Kontrol Et</button>
    <div id="sonuc" style="display:none;"></div>
</div>

<script>
const UYE_KODU = "W4YWEKNMEAWK";
const ADMIN_KODU = "W4YWEKNMEAWK12";
const REPO_OWNER = "benbircevozagaciyimgulhaneparkinda"; // Burayı değiştir!
const REPO_NAME = "Kodla-madam-";       // Burayı değiştir!

// 1. Otomatik Günlük Şifre Hesaplayıcı (00:00'da değişir)
function otomatikSifreUret() {
    const d = new Date();
    const seed = d.getDate() * 12345 + (d.getMonth() + 1) * 6789 + d.getFullYear();
    return Math.abs((seed * 1103515245 + 12345) % 1000000).toString().padStart(6, '0');
}

async function islemYap() {
    const giris = document.getElementById("anahtar").value;
    const sonucBox = document.getElementById("sonuc");

    // DURUM: ÜYE GİRİŞİ (Şifreyi Görme)
    if (giris === UYE_KODU) {
        sonucBox.style.display = "block";
        sonucBox.innerText = "Yükleniyor...";

        try {
            // GitHub'daki dosyadan manuel şifreyi kontrol et
            const res = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/guncel_sifre.txt?t=${new Date().getTime()}`);
            const tarihRes = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/son_guncelleme.txt?t=${new Date().getTime()}`);
            
            const manuelSifre = (await res.text()).trim();
            const guncellemeTarihi = (await tarihRes.text()).trim();
            const bugun = new Date().toLocaleDateString('tr-TR');

            if (guncellemeTarihi === bugun && manuelSifre) {
                sonucBox.innerHTML = `Bugünün Şifresi (Admin): <br>${manuelSifre}`;
            } else {
                sonucBox.innerHTML = `Bugünün Otomatik Şifresi: <br>${otomatikSifreUret()}`;
            }
        } catch (e) {
            sonucBox.innerHTML = `Bugünün Otomatik Şifresi: <br>${otomatikSifreUret()}`;
        }
    }

    // DURUM: ADMIN GİRİŞİ (Şifre Değiştirme)
    else if (giris === ADMIN_KODU) {
        const yeniSifre = prompt("Herkes için geçerli olacak 6 haneli şifreyi girin:");
        if (!yeniSifre) return;
        
        const token = prompt("Güvenlik için GitHub Token'ınızı girin (Kodda saklanmaz):");
        if (!token) return;

        sonucBox.style.display = "block";
        sonucBox.innerText = "Sistem güncelleniyor, lütfen bekleyin...";

        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github.v3+json',
            },
            body: JSON.stringify({
                event_type: 'sifre_degistir',
                client_payload: { yeni_sifre: yeniSifre }
            })
        });

        if (response.ok) {
            alert("Başarılı! Bot çalışmaya başladı. 1 dakika içinde şifre herkes için değişecek.");
        } else {
            alert("Hata! Token yanlış veya yetkisiz.");
        }
    } else {
        alert("Hatalı anahtar!");
    }
}
</script>
</body>
</html>

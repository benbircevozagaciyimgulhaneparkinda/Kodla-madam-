<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Attack - Dinamik Sistem</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #0a0a0a; color: #00ff00; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 15px; border: 2px solid #00ff00; box-shadow: 0 0 30px rgba(0, 255, 0, 0.3); text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #00ff00; background: #000; color: #00ff00; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; background: #00ff00; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00cc00; box-shadow: 0 0 15px #00ff00; }
        #sonuc { margin-top: 20px; padding: 15px; background: #001a00; border: 1px dashed #00ff00; display: none; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-shadow: 0 0 10px #00ff00;">SİSTEM ERİŞİMİ</h2>
    <input type="password" id="anahtar" placeholder="ANAHTARI GİRİN...">
    <button onclick="islemYap()">KONTROL ET</button>
    <div id="sonuc"></div>
</div>

<script>
// --- BİLGİLERİN GÜNCELLENDİ DOSTUM ---
const REPO_OWNER = "benbircevozagaciyimgulhaneparkinda"; 
const REPO_NAME = "Kodla-madam-"; 
// ----------------------------------------------

const UYE_KODU = "W4YWEKNMEAWK";
const ADMIN_KODU = "W4YWEKNMEAWK12";

// Her gün 00:00'da otomatik değişen şifre
function otomatikSifreUret() {
    const d = new Date();
    const seed = d.getDate() * 12345 + (d.getMonth() + 1) * 6789 + d.getFullYear();
    return Math.abs((seed * 1103515245 + 12345) % 1000000).toString().padStart(6, '0');
}

// GitHub API üzerinden dosyayı çeken ve cache sorununu bitiren fonksiyon
async function dosyaVerisiniCek(dosyaAdi) {
    const t = new Date().getTime();
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${dosyaAdi}?t=${t}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    // Base64 formatını çözerken Türkçe karakter sorunu olmaması için düzenlendi
    return decodeURIComponent(escape(atob(data.content))).trim();
}

async function islemYap() {
    const giris = document.getElementById("anahtar").value;
    const sonucBox = document.getElementById("sonuc");
    const bugun = new Date().toLocaleDateString('tr-TR');

    sonucBox.style.display = "block";
    sonucBox.innerHTML = "Sorgulanıyor...";

    // ÜYE GİRİŞİ: ŞİFREYİ GÖSTER
    if (giris === UYE_KODU) {
        try {
            const manuelSifre = await dosyaVerisiniCek("guncel_sifre.txt");
            const guncellemeTarihi = await dosyaVerisiniCek("son_guncelleme.txt");

            if (guncellemeTarihi === bugun && manuelSifre) {
                sonucBox.innerHTML = `BUGÜNÜN ŞİFRESI (ADMIN):<br><b style="font-size: 1.5rem;">${manuelSifre}</b>`;
            } else {
                sonucBox.innerHTML = `GÜNLÜK OTOMATİK ŞİFRE:<br><b style="font-size: 1.5rem;">${otomatikSifreUret()}</b>`;
            }
        } catch (e) {
            sonucBox.innerHTML = `OTOMATİK KOD:<br>${otomatikSifreUret()}`;
        }
    }

    // ADMIN GİRİŞİ: ŞİFREYİ DEĞİŞTİR
    else if (giris === ADMIN_KODU) {
        const yeniSifre = prompt("Yeni 6 haneli şifreyi belirleyin:");
        if (!yeniSifre) { sonucBox.style.display = "none"; return; }
        
        const token = prompt("GitHub Token (ghp_...) yapıştırın:");
        if (!token) { sonucBox.style.display = "none"; return; }

        sonucBox.innerText = "Bot Tetiklendi... 45 saniye içinde güncellenecek.";

        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github.v3+json',
            },
            body: JSON.stringify({
                event_type: 'sifre_degistir',
                client_payload: { yeni_sifre: yeniSifre }
            })
        });

        if (response.ok) {
            alert("BAŞARILI! Bot çalışıyor. Birazdan herkes yeni şifreyi görecek.");
            location.reload();
        } else {
            alert("HATA! Token yetkisiz veya bilgiler hatalı.");
            sonucBox.style.display = "none";
        }
    } else {
        alert("GEÇERSİZ ANAHTAR!");
        sonucBox.style.display = "none";
    }
}
</script>
</body>
</html>

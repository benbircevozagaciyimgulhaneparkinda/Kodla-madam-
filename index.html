<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Attack - Giriş Sistemi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f0f0f; color: #00ff41; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid #00ff41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #00ff41; background: #000; color: #00ff41; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #00ff41; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #00cc33; box-shadow: 0 0 15px #00ff41; }
        #sonuc { margin-top: 20px; padding: 15px; border-radius: 10px; background: #000; border: 1px dashed #00ff41; display: none; word-break: break-all; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="letter-spacing: 2px;">SİSTEM ERİŞİMİ</h2>
    <input type="password" id="anahtar" placeholder="ANAHTARI GİRİN...">
    <button onclick="islemYap()">Sorgula / Güncelle</button>
    <div id="sonuc"></div>
</div>

<script>
// --- BURAYI KENDİ BİLGİLERİNLE DOLDUR DOSTUM ---
const REPO_OWNER = "benbircevozagaciyimgulhaneparkinda"; // GitHub kullanıcı adın
const REPO_NAME = "Kodla-madam-"; // Repo adın
// ----------------------------------------------

const UYE_KODU = "W4YWEKNMEAWK";
const ADMIN_KODU = "W4YWEKNMEAWK12";

// Her gün değişen bağımsız şifre
function otomatikSifreUret() {
    const d = new Date();
    const seed = d.getDate() * 12345 + (d.getMonth() + 1) * 6789 + d.getFullYear();
    return Math.abs((seed * 1103515245 + 12345) % 1000000).toString().padStart(6, '0');
}

async function islemYap() {
    const giris = document.getElementById("anahtar").value;
    const sonucBox = document.getElementById("sonuc");
    const bugun = new Date().toLocaleDateString('tr-TR');

    // ÜYE GİRİŞİ: ŞİFREYİ GÖR
    if (giris === UYE_KODU) {
        sonucBox.style.display = "block";
        sonucBox.innerHTML = "Veritabanına bağlanılıyor...";
        
        try {
            // DOSYAYA GİRİP ÇIKMA DERDİNİ BİTİREN KISIM (?t=...)
            const t = new Date().getTime();
            const res = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/guncel_sifre.txt?t=${t}`);
            const tarihRes = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/son_guncelleme.txt?t=${t}`);
            
            const manuelSifre = (await res.text()).trim();
            const guncellemeTarihi = (await tarihRes.text()).trim();

            if (guncellemeTarihi === bugun && manuelSifre) {
                sonucBox.innerHTML = `ERİŞİM KODU (ADMIN):<br><span style="font-size: 24px;">${manuelSifre}</span>`;
            } else {
                sonucBox.innerHTML = `GÜNLÜK OTOMATİK KOD:<br><span style="font-size: 24px;">${otomatikSifreUret()}</span>`;
            }
        } catch (e) {
            sonucBox.innerHTML = `OTOMATİK KOD:<br>${otomatikSifreUret()}`;
        }
    }

    // ADMIN GİRİŞİ: ŞİFREYİ DEĞİŞTİR
    else if (giris === ADMIN_KODU) {
        const yeniSifre = prompt("Yeni 6 haneli şifreyi belirleyin:");
        if (!yeniSifre) return;
        
        const token = prompt("GitHub Token (ghp_...) girin:");
        if (!token) return;

        sonucBox.style.display = "block";
        sonucBox.innerText = "GitHub Botu tetikleniyor... Bekleyin.";

        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github.v3+json',
            },
            body: JSON.stringify({
                event_type: 'sifre_degistir',
                client_payload: { yeni_sifre: yeniSifre }
            })
        });

        if (response.ok) {
            alert("İşlem Başarılı! 45-60 saniye içinde şifre herkes için değişecek.");
            setTimeout(() => { location.reload(); }, 2000); 
        } else {
            alert("Hata! Token yetkisiz veya yanlış.");
        }
    } else {
        alert("GEÇERSİZ ANAHTAR!");
    }
}
</script>
</body>
</html>
